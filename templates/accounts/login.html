<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Connexion</title>
</head>
<body>
    <h1>Connexion</h1>

    {% if form.errors %}
        <p style="color: red;">Identifiants invalides. Merci de réessayer.</p>
    {% endif %}

    {% if next %}
        <p>Connectez-vous pour accéder à la page demandée.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label for="id_username">Nom d'utilisateur :</label>
            {{ form.username }}
        </p>
        <p>
            <label for="id_password">Mot de passe :</label>
            {{ form.password }}
        </p>
        <button type="submit">Se connecter</button>
    </form>
</body>
</html>
